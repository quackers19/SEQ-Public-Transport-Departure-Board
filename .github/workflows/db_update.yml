name: Build GTFS Database

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'source url'
        required: true
      stop-ids:
        description: 'stops to include'
        required: true
jobs:
  build-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Build GTFS
        uses: quackers19/Translink-GTFS-Schedule-Pipeline@v1

        with:
          url: '${{ github.event.inputs.url }}'
          output: 'gtfs-${{ github.event.inputs.stop-ids }}.db'
          stop-ids: '${{ github.event.inputs.stop-ids }}'
      
      - name: Upload Database
        uses: actions/upload-artifact@v7
        with:
          name: gtfs-${{ github.event.inputs.stop-ids }}
          path: gtfs-${{ github.event.inputs.stop-ids }}.db
          retention-days: 30
          archive: false